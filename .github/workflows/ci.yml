name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Vitest (core vs committed fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build (smoke check)
        run: npm run build
